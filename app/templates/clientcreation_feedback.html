{% extends "index.html" %}

{% block title %}{{ messages['clientcreation.title'] }}{% endblock %}

{% block content %}
<div class="sh-page-header">
    <div>
        <div class="sh-eyebrow"><i class="bi bi-plus-circle"></i> {{ messages['clientcreation.title'] }}</div>
        <h1>Request submitted</h1>
    </div>
    <a href="{{ url_for('index') }}" class="sh-back-link"><i class="bi bi-arrow-left"></i> {{ messages['back_home'] }}</a>
</div>

<div class="sh-card">
    <div class="sh-card-body">
        <div class="d-flex align-items-start gap-3">
            <div class="sh-status-icon text-success"><i class="bi bi-check-circle-fill"></i></div>
            <div>
                <h2 class="h5 mb-1">All set!</h2>
                <p class="text-muted mb-0">{{ messages['clientcreation_feedback.success'] }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
