{% extends "index.html" %}

{% block title %}{{ messages['usersesssions.title'] }}{% endblock %}

{% block content %}

<script>
    /**
     * Prevents the form's default behavior so as to lead to /user-sessions/{{environment}}/{{realm}}/{{identifier}} instead of adding the identifier as a query parameter
     * @param {HTMLFormElement} form The submitted form element.
     */
    function handleFormSubmission(form) {
        event.preventDefault();
        const identifierInput = document.getElementById('identifier');
        const identifierValue = identifierInput.value;
        const baseUrl = form.getAttribute('action');
        const newUrl = baseUrl + '/' + encodeURIComponent(identifierValue);
        window.location.href = newUrl;
        return false;
    }
</script>

<div class="sh-page-header">
    <div>
        <div class="sh-eyebrow"><i class="bi bi-people"></i> {{ messages['usersesssions.title'] }}</div>
        <h1>{{ environment }} <span class="text-muted">/</span> {{ realm }}</h1>
        <p class="sh-subtitle">Look up a user's active sessions by identifier.</p>
    </div>
    <a href="/user-sessions/{{ environment }}" class="sh-back-link"><i class="bi bi-arrow-left"></i> Back to realms</a>
</div>

<div class="row">
    <div class="col-lg-7">
        <div class="sh-card">
            <div class="sh-card-header">
                <h2><i class="bi bi-search text-primary"></i> Lookup user</h2>
            </div>
            <div class="sh-card-body">
                <form
                    method="get"
                    action="/user-sessions/{{environment}}/{{realm}}"
                    onsubmit="handleFormSubmission(this)"
                    class="sh-form"
                >
                    <div class="mb-3">
                        <label for="identifier" class="form-label">{{ messages['usersesssions.identifier_input_label'] }}</label>
                        <input type="text" id="identifier" name="identifier" class="form-control" placeholder="username, email or user id" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search me-1"></i>{{ messages['usersesssions.submit_request'] }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
