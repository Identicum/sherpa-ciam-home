{% extends "index.html" %}

{% block title %}403 - Forbidden{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center sh-error-page">
    <div class="sh-error-icon"><i class="bi bi-shield-exclamation"></i></div>
    <h1 class="display-3 fw-bold text-danger mb-2">403</h1>
    <h2 class="h4 mb-3">{{ messages['security.access_denied.title'] }}</h2>
    <p class="text-muted mb-4 sh-error-text">{{ messages['security.access_denied.message'] }}</p>
    <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i>{{ messages['security.access_denied.back_button'] }}</a>
</div>
{% endblock %}
